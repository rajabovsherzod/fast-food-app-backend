version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fastfood-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastfood_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastfood-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fastfood_db
      JWT_SECRET: fast-food-delivery-super-secret-jwt-key-min-32-characters-long
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: fast-food-delivery-refresh-token-secret-key-32-chars
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 5242880
      DEFAULT_DELIVERY_PRICE: 15000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src
    command: npm run dev

volumes:
  postgres_data:
    driver: local
