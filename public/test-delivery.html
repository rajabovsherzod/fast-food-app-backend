<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery App - Test</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .status { padding: 10px; background: #e3f2fd; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .status.connected { background: #c8e6c9; }
        .status.error { background: #ffcdd2; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .section h2 { font-size: 16px; margin-bottom: 10px; color: #555; }
        button { padding: 10px 20px; background: #00bcd4; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; margin-top: 5px; width: 100%; }
        button:hover { background: #0097a7; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.success { background: #4CAF50; }
        button.danger { background: #f44336; }
        input { padding: 10px; width: 100%; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
        .order-card { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 4px; border-left: 4px solid #00bcd4; }
        .order-card.new { animation: highlight 1s; }
        @keyframes highlight { from { background: #b2ebf2; } to { background: #f9f9f9; } }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #e0f7fa; padding: 15px; border-radius: 4px; text-align: center; }
        .stat-card h3 { font-size: 24px; color: #00796b; margin-bottom: 5px; }
        .stat-card p { font-size: 12px; color: #666; }
        .notification { position: fixed; top: 20px; right: 20px; background: #323232; color: white; padding: 15px 20px; border-radius: 4px; animation: slideIn 0.3s; z-index: 1000; max-width: 300px; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }
        .location-update { background: #fff3cd; padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚚 Delivery App</h1>
        
        <div class="status" id="status">⏳ Ready to login</div>

        <div class="section" id="loginSection">
            <h2>🔐 Login (Telegram)</h2>
            <input type="text" id="telegramId" placeholder="Telegram ID" value="987654321">
            <input type="text" id="firstName" placeholder="First Name" value="Delivery Person">
            <input type="text" id="phoneNumber" placeholder="Phone (+998...)" value="+998901234568">
            <button id="loginBtn">Login as Delivery</button>
        </div>

        <div class="stats hidden" id="stats">
            <div class="stat-card">
                <h3 id="activeOrders">0</h3>
                <p>Active Orders</p>
            </div>
            <div class="stat-card">
                <h3 id="todayDeliveries">0</h3>
                <p>Today's Deliveries</p>
            </div>
        </div>

        <div class="section hidden" id="ordersSection">
            <h2>📦 Assigned Orders</h2>
            <button id="refreshOrdersBtn">Refresh Orders</button>
            <div id="orders"></div>
        </div>

        <div class="section hidden" id="statsSection">
            <h2>📊 Statistics</h2>
            <button id="loadStatsBtn">Load Stats</button>
            <div id="statsDetails"></div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('delivery_token');
        let socket = null;

        const statusEl = document.getElementById('status');
        const loginSection = document.getElementById('loginSection');
        const ordersSection = document.getElementById('ordersSection');
        const statsSection = document.getElementById('statsSection');
        const statsEl = document.getElementById('stats');

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        function updateStatus(message, type = 'info') {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        document.getElementById('loginBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const loginData = {
                telegramId: document.getElementById('telegramId').value,
                firstName: document.getElementById('firstName').value,
                lastName: '',
                phoneNumber: document.getElementById('phoneNumber').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/v1/auth/telegram-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });

                const data = await response.json();
                
                if (data.success) {
                    token = data.data.accessToken;
                    localStorage.setItem('delivery_token', token);
                    
                    if (data.data.user.role === 'delivery') {
                        showNotification('✅ Login successful!');
                        updateStatus('✅ Logged in as ' + data.data.user.firstName, 'connected');
                        
                        loginSection.classList.add('hidden');
                        ordersSection.classList.remove('hidden');
                        statsSection.classList.remove('hidden');
                        statsEl.classList.remove('hidden');
                        
                        connectSocket();
                        loadOrders();
                        loadStats();
                    } else {
                        showNotification('⚠️ Role is not "delivery". Contact admin.');
                        updateStatus('⚠️ Role: ' + data.data.user.role, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Login as Delivery';
                    }
                } else {
                    showNotification('❌ Login failed: ' + data.message);
                    updateStatus('❌ Login failed', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login as Delivery';
                }
            } catch (error) {
                showNotification('❌ Error: ' + error.message);
                updateStatus('❌ Error', 'error');
                btn.disabled = false;
                btn.textContent = 'Login as Delivery';
            }
        });

        function connectSocket() {
            if (!token) return;

            socket = io('http://localhost:3000', {
                auth: { token }
            });

            socket.on('connect', () => {
                updateStatus('🔌 Connected (Real-time)', 'connected');
            });

            socket.on('delivery:assigned', (order) => {
                showNotification('🆕 New delivery assigned: ' + order.orderNumber);
                addOrderToList(order, true);
                loadStats();
            });

            socket.on('order:status:changed', (order) => {
                showNotification('🔄 Order ' + order.orderNumber + ': ' + order.status);
                updateOrderInList(order);
            });
        }

        document.getElementById('refreshOrdersBtn').addEventListener('click', loadOrders);

        async function loadOrders() {
            if (!token) return;

            try {
                const response = await fetch('http://localhost:3000/api/v1/delivery/orders', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();
                
                if (data.success) {
                    const ordersDiv = document.getElementById('orders');
                    ordersDiv.innerHTML = '';
                    data.data.forEach(order => addOrderToList(order));
                    document.getElementById('activeOrders').textContent = data.data.length;
                    showNotification('✅ Orders loaded: ' + data.data.length);
                }
            } catch (error) {
                showNotification('❌ Error loading orders');
            }
        }

        function addOrderToList(order, isNew = false) {
            const ordersDiv = document.getElementById('orders');
            const orderCard = document.createElement('div');
            orderCard.className = 'order-card' + (isNew ? ' new' : '');
            orderCard.id = 'order-' + order.id;
            
            const buttons = order.status === 'ready' 
                ? `<button class="success" data-order-id="${order.id}" data-action="accept">Start Delivery</button>`
                : order.status === 'delivering'
                ? `
                    <button data-order-id="${order.id}" data-action="location">Update Location</button>
                    <button class="success" data-order-id="${order.id}" data-action="complete">Complete</button>
                  `
                : '';

            orderCard.innerHTML = `
                <strong>📋 ${order.orderNumber}</strong><br>
                Status: <span style="color: ${getStatusColor(order.status)}">${order.status}</span><br>
                📍 ${order.deliveryAddress}<br>
                📞 ${order.phoneNumber}<br>
                💰 ${order.totalPrice} so'm (${order.paymentMethod})<br>
                <small>⏰ ${new Date(order.createdAt).toLocaleString('uz-UZ')}</small><br>
                ${buttons}
                <div id="location-${order.id}" class="location-update hidden"></div>
            `;
            ordersDiv.insertBefore(orderCard, ordersDiv.firstChild);
            
            // Add event listeners
            orderCard.querySelectorAll('button[data-action]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const orderId = this.getAttribute('data-order-id');
                    const action = this.getAttribute('data-action');
                    
                    if (action === 'accept') acceptOrder(orderId);
                    else if (action === 'location') updateLocation(orderId);
                    else if (action === 'complete') completeDelivery(orderId);
                });
            });
        }

        function updateOrderInList(order) {
            loadOrders(); // Reload all orders
        }

        async function acceptOrder(orderId) {
            if (!token) return;

            try {
                const response = await fetch(`http://localhost:3000/api/v1/delivery/orders/${orderId}/accept`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();
                
                if (data.success) {
                    showNotification('✅ Delivery started!');
                    loadOrders();
                } else {
                    showNotification('❌ Failed to accept order');
                }
            } catch (error) {
                showNotification('❌ Error: ' + error.message);
            }
        }

        async function updateLocation(orderId) {
            if (!token) return;

            // Simulate GPS location
            const lat = (41.2995 + Math.random() * 0.01).toFixed(6);
            const lng = (69.2401 + Math.random() * 0.01).toFixed(6);

            try {
                const response = await fetch(`http://localhost:3000/api/v1/delivery/orders/${orderId}/location`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ latitude: lat, longitude: lng })
                });

                const data = await response.json();
                
                if (data.success) {
                    showNotification('📍 Location updated: ' + lat + ', ' + lng);
                    const locationDiv = document.getElementById('location-' + orderId);
                    if (locationDiv) {
                        locationDiv.classList.remove('hidden');
                        locationDiv.textContent = `📍 Last update: ${lat}, ${lng}`;
                    }
                } else {
                    showNotification('❌ Failed to update location');
                }
            } catch (error) {
                showNotification('❌ Error: ' + error.message);
            }
        }

        async function completeDelivery(orderId) {
            if (!token) return;

            try {
                const response = await fetch(`http://localhost:3000/api/v1/delivery/orders/${orderId}/complete`, {
                    method: 'PATCH',
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();
                
                if (data.success) {
                    showNotification('✅ Delivery completed!');
                    loadOrders();
                    loadStats();
                } else {
                    showNotification('❌ Failed to complete delivery');
                }
            } catch (error) {
                showNotification('❌ Error: ' + error.message);
            }
        }

        document.getElementById('loadStatsBtn').addEventListener('click', loadStats);

        async function loadStats() {
            if (!token) return;

            try {
                const response = await fetch('http://localhost:3000/api/v1/delivery/statistics', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    document.getElementById('todayDeliveries').textContent = stats.todayDeliveries || 0;
                    
                    const statsDiv = document.getElementById('statsDetails');
                    statsDiv.innerHTML = `
                        <p>Total Deliveries: ${stats.totalDeliveries || 0}</p>
                        <p>Today's Earnings: ${stats.todayEarnings || 0} so'm</p>
                        <p>Total Earnings: ${stats.totalEarnings || 0} so'm</p>
                    `;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function getStatusColor(status) {
            const colors = {
                ready: '#4CAF50',
                delivering: '#00bcd4',
                delivered: '#4CAF50'
            };
            return colors[status] || '#666';
        }

        // Auto-login if token exists
        if (token) {
            updateStatus('✅ Token found, connecting...', 'connected');
            loginSection.classList.add('hidden');
            ordersSection.classList.remove('hidden');
            statsSection.classList.remove('hidden');
            statsEl.classList.remove('hidden');
            connectSocket();
            loadOrders();
            loadStats();
        }
    </script>
</body>
</html>
